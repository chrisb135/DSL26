name: ADF4350 Kernel CI

on: [push]

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Toolchain and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu build-essential libncurses-dev flex bison bc libssl-dev expect qemu-system-arm

      - name: Baixar e Preparar Headers do Kernel ARM64
        run: |
          # Baixa o código fonte do Linux 6.1
          wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.1.tar.xz
          tar -xf linux-6.1.tar.xz

          # Entra na pasta do kernel recém-baixado
          cd linux-6.1

          # Prepara a configuração do kernel alvo para arquitetura ARM64
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare

          # Volta para a raiz do seu repositório
          cd ..

      - name: Build Module
        run: |
          # Agora rodamos o SEU Makefile, mas apontando o KDIR para a pasta que preparamos
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KDIR=$GITHUB_WORKSPACE/linux-6.1

      - name: Criar disco de transferencia com o modulo
        run: |
          # Cria um arquivo vazio de 10MB
          dd if=/dev/zero of=transfer.img bs=1M count=10
          # Formata como ext4
          mkfs.ext4 transfer.img
          # Monta o disco e copia o módulo recém-compilado
          mkdir mnt_tmp
          sudo mount -o loop transfer.img mnt_tmp
          # ATENÇÃO: Ajuste o caminho abaixo para onde o seu .ko é gerado!
          sudo cp drivers/iio/frequency/adf4350.ko mnt_tmp/
          sudo umount mnt_tmp

      - name: Baixar Imagens do QEMU (Opção A)
        run: |
          # 1. Cria as pastas onde o test_script.sh espera encontrar os arquivos
          mkdir -p vm/arm64_boot
          mkdir -p iio/arch/arm64/boot

          # 2. Baixa a imagem do disco rootfs (qcow2)
          # SUBSTITUA A URL ABAIXO PELO LINK REAL DO SEU ARQUIVO
          wget -O vm/arm64_img.qcow2 "https://github.com/chrisb135/DSL26/releases/download/First_release/base_arm64_img.qcow2"

          # 3. Baixa o kernel compilado (Image)
          # SUBSTITUA A URL ABAIXO PELO LINK REAL DO SEU ARQUIVO
          wget -O iio/arch/arm64/boot/Image "https://github.com/chrisb135/DSL26/releases/download/First_release/Image"

          # 4. Baixa o initrd
          # SUBSTITUA A URL ABAIXO PELO LINK REAL DO SEU ARQUIVO
          wget -O vm/arm64_boot/initrd.tar.gz "https://github.com/chrisb135/DSL26/releases/download/First_release/initrd.tar.gz"

          # 5. Descompacta o arquivo na pasta correta e apaga o .tar.gz para limpar espaço
          cd vm/arm64_boot/
          tar -xzvf initrd.tar.gz
          rm initrd.tar.gz
          cd ../../

      - name: Run Integration Test in QEMU
        run: |
          # Garante que o script tem permissão de execução
          chmod +x test_script.sh
          ./test_script.sh
